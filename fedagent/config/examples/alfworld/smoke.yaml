# Federated ALFWorld SMOKE: prove the closed federated loop works on the 2nd environment
# (ALFWorld remote service) end-to-end -- per-client service -> train -> matched-PG FedAvg
# -> merge -> round 2 from the aggregate. Qwen2.5-1.5B, 2 clients x 2 rounds, uniform game
# shard (homogeneous; env-het via partition_strategy=preference/coverage/hardness/env_disjoint
# is a follow-up). Robust single-run recipe (n_gpus 4). Mechanism proof, not a signal run.

env_kind: alfworld
env_spec: config/envs/alfworld.yaml
output_dir: /tmp/xbb9020_fedagent_alfworld_smoke
model_path: Qwen/Qwen2.5-1.5B-Instruct                  # HF id; offline clusters: --model-path <local snapshot>

total_clients: 2
clients_per_round: 2
total_rounds: 2
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 4
total_training_steps: 4
save_freq: 4
wait_between_clients: 8

partition_strategy: ""          # uniform game shard (homogeneous smoke)
alfworld_pool_size: 16          # >= gen_batch (train_batch_size 8 x rollout.n 2 = 16); matches proven WebShop recipe
alfworld_base_port: 8200
alfworld_train_eval: train

client_overrides:
  - data.train_batch_size=8     # proven WebShop batch shape on 4 GPUs (divisible by force_group_size*micro_batch)
  - data.max_prompt_length=2048
  - data.max_response_length=4096
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=4096
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.5   # headroom on shared 4-GPU node; 8192-ctx KV cache + 1.5B weights fit at 0.5
