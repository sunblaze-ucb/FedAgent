# FedProx HOOK TEST: 1 client, 1 round, 2 steps, mu=0.1, catalog_split.
# Verifies the Ray worker_process_setup_hook applies fedagent.fedprox in the
# actor-engine worker -- look for "[fedprox] enabled: proximal mu=0.1" in the
# client training.log and that training proceeds normally. Cheap (~5 min).

env_kind: webshop
env_spec: config/envs/webshop_15.yaml
output_dir: /tmp/xbb9020_fedagent_fedprox_test
model_path: Qwen/Qwen2.5-1.5B-Instruct                  # HF id; offline clusters: --model-path <local snapshot>

total_clients: 1
clients_per_round: 1
total_rounds: 1
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 2
total_training_steps: 2
save_freq: 2
wait_between_clients: 5

partition_strategy: catalog_split
env_div: 0.7
keep_ratio: 0.7
min_goals_per_client: 100
webshop_pool_size: 16
webshop_base_port: 8086
fedprox_mu: 0.1                  # >0 -> exercises the FedProx proximal hook

client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=6144
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=6144
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
