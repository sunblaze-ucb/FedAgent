# COMPOUNDING TEST: homogeneous (IID) baseline over MORE rounds (8) to see if the
# federated round-mean reward climbs over rounds (the 4-round/4-step runs were flat).
# pool=8 (16 envs) so it can run CONCURRENTLY with another single run under the 900GB cap
# (each WebShop env ~14GB; 48 envs ~672GB safe). Qwen2.5-1.5B @ 15 turns, 2 clients.

env_kind: webshop
env_spec: config/envs/webshop_15.yaml
output_dir: /tmp/xbb9020_fedagent_homog_long
model_path: Qwen/Qwen2.5-1.5B-Instruct                  # HF id; offline clusters: --model-path <local snapshot>

total_clients: 2
clients_per_round: 2
total_rounds: 8                  # more rounds -> can the round-mean reward compound?
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 2
total_training_steps: 4
save_freq: 4
wait_between_clients: 8

partition_strategy: ""           # homogeneous (IID) baseline
webshop_pool_size: 8             # 16 envs -> safe to run concurrently with another run
webshop_base_port: 8090

client_overrides:
  - data.train_batch_size=4      # gen_batch = 4 x rollout.n 2 = 8 = pool
  - data.max_prompt_length=2048
  - data.max_response_length=6144
  - actor_rollout_ref.actor.ppo_mini_batch_size=4
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=6144
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
