# CENTRALIZED baseline (the "pool all data" reference): ONE model trained on the full,
# unpartitioned WebShop (full catalog + all goals), no federation. Implemented as a
# single-client run -- the per-round FedAvg of one client is the identity, so the loop is
# just total_rounds x epochs_per_round of continued centralized training. This is the upper
# reference the federated/local arms are measured against. Qwen2.5-1.5B @ 15 turns, 4 GPUs.

env_kind: webshop
env_spec: config/envs/webshop_15.yaml
output_dir: /tmp/xbb9020_fedagent_scaled_centralized
model_path: Qwen/Qwen2.5-1.5B-Instruct                  # HF id; offline clusters: --model-path <local snapshot>

total_clients: 1                       # one model == centralized; FedAvg of 1 client is identity
clients_per_round: 1
total_rounds: 4                        # 4 "rounds" == 4 continued centralized training blocks
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 4
total_training_steps: 4
save_freq: 4
wait_between_clients: 8

partition_strategy: ""                 # full catalog + all goals (no partition) == pooled data
webshop_pool_size: 16
webshop_base_port: 8128

client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=6144
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=6144
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
