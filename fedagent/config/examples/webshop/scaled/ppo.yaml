# PPO (adv_estimator=gae) homogeneous baseline -- the algorithm-ablation counterpart to
# the GRPO scaled configs. Proves the federated PPO loop closes: each client trains an
# actor AND a critic (value model), run_fed FedAvgs BOTH, merges each to HF, and the next
# round resumes the actor from model.path and the critic from critic.model.path (round-1
# critic = base model, a random value head on the backbone -- mirroring the original
# critic.model.path=<base>). Qwen2.5-1.5B @ 15 turns, 2 clients x 4 rounds, 4 GPUs.
#
# Swap `partition_strategy` (+ its kwargs) to get the PPO x heterogeneity arms the paper
# reports (e.g. lookalike/bm25_reweight/rank/field_subset for env-het, preference/coverage
# for task-het); see examples/webshop/scaled/ppo_lookalike.yaml for the env-het PPO template.

env_kind: webshop
env_spec: config/envs/webshop_15.yaml
output_dir: /tmp/xbb9020_fedagent_scaled_ppo
model_path: Qwen/Qwen2.5-1.5B-Instruct                  # HF id; offline clusters: --model-path <local snapshot>

adv_estimator: gae                     # PPO: federate actor + critic (GRPO configs omit this -> no critic)

total_clients: 2
clients_per_round: 2
total_rounds: 4
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 4                     # PPO keeps actor+critic+ref resident -> 4-GPU recipe
total_training_steps: 4
save_freq: 4
wait_between_clients: 8

partition_strategy: ""                 # homogeneous: full catalog, all goals shared (IID)
webshop_pool_size: 16
webshop_base_port: 8120                # distinct from the GRPO arms' ports

client_overrides:
  # --- data / actor (mirrors the GRPO scaled recipe, + PPO KL-in-loss like the original) ---
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=4096
  - actor_rollout_ref.actor.optim.lr=1e-6
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=4
  - actor_rollout_ref.actor.use_kl_loss=true
  - actor_rollout_ref.actor.kl_loss_coef=0.01
  - actor_rollout_ref.actor.kl_loss_type=low_var_kl
  - actor_rollout_ref.actor.fsdp_config.param_offload=false
  - actor_rollout_ref.actor.fsdp_config.optimizer_offload=true      # plumbing: free GPU for the critic
  - actor_rollout_ref.actor.checkpoint.save_contents=[model]        # FedAvg only the weights (fresh optim/round)
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=4096
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.5            # lower than GRPO: critic is resident too
  # --- critic (value model); critic.model.path is set per-round by run_fed, NOT pinned here ---
  - critic.optim.lr=1e-5
  - critic.model.use_remove_padding=true
  - critic.model.enable_gradient_checkpointing=true
  - critic.fsdp.param_offload=false             # verl 0.8: critic FSDP lives at critic.fsdp (not critic.model.fsdp_config)
  - critic.fsdp.optimizer_offload=true
  - critic.ppo_micro_batch_size_per_gpu=4
  - critic.checkpoint.save_contents=[model]
  - trainer.critic_warmup=0
