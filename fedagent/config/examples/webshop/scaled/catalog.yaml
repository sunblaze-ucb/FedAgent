# SCALED env-heterogeneity run: 2 clients x 4 rounds, WebShop Catalog-Split,
# Qwen2.5-1.5B @ 15 turns. Multi-round federated training across disjoint catalogs
# -> does FedAvg keep learning under env heterogeneity? (reward curve over rounds).
# Reward is read from each client's training.log (critic/rewards/mean) until the
# JSON logger lands. Fills the GPU window; ~1.5-2h.

env_kind: webshop
env_spec: config/envs/webshop_15.yaml
output_dir: /tmp/xbb9020_fedagent_scaled_env
model_path: Qwen/Qwen2.5-1.5B-Instruct                  # HF id; offline clusters: --model-path <local snapshot>

total_clients: 2
clients_per_round: 2
total_rounds: 4
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 2
total_training_steps: 4            # 4 PPO steps per client per round
save_freq: 4                       # checkpoint at the end of each round's training
wait_between_clients: 8

partition_strategy: catalog_split
env_div: 0.7
keep_ratio: 0.7
min_goals_per_client: 100
webshop_pool_size: 16
webshop_base_port: 8080

client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=6144
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=6144
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
