# ENV-heterogeneity Variant 2 (Field-Subset Index): each client's BM25 index sees a
# different subset of product fields -> a distinct retrieval transition kernel P_i, with
# the goal/task split held UNIFORM (full catalog). Verbatim _bm25_variant_partition_webshop
# (fedagent/hetero/webshop_env_variants.py); kwargs merged into gym.make server-side.
# Qwen2.5-1.5B @ 15 turns, 2x4. Robust single-run recipe (n_gpus 4, pool 16).

env_kind: webshop
env_spec: config/envs/webshop_15.yaml
output_dir: /tmp/xbb9020_fedagent_scaled_bm25field
model_path: Qwen/Qwen2.5-1.5B-Instruct                  # HF id; offline clusters: --model-path <local snapshot>

total_clients: 2
clients_per_round: 2
total_rounds: 4
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 4
total_training_steps: 4
save_freq: 4
wait_between_clients: 8

partition_strategy: bm25_field_subset  # env-variant V2: field-subset BM25 index, UNIFORM goals
webshop_pool_size: 16
webshop_base_port: 8104

client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=6144
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=6144
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
