# ENV-heterogeneity Variant 4 (Lookalike Injection): each client's catalog is augmented
# with a different set of ~1000 lookalike (near-duplicate distractor) products -> a distinct
# search-result transition kernel P_i, goal/task split UNIFORM. Verbatim
# _lookalike_injection_partition_webshop (fedagent/hetero/webshop_env_variants.py); lookalike
# sets at data/env_heterogeneity/lookalike_data/. Qwen2.5-1.5B @ 15 turns, 2x4 (n_gpus 4, pool 16).

env_kind: webshop
env_spec: config/envs/webshop_15.yaml
output_dir: /tmp/xbb9020_fedagent_scaled_lookalike
model_path: Qwen/Qwen2.5-1.5B-Instruct                  # HF id; offline clusters: --model-path <local snapshot>

total_clients: 2
clients_per_round: 2
total_rounds: 4
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 4
total_training_steps: 4
save_freq: 4
wait_between_clients: 8

partition_strategy: lookalike          # env-variant V4: lookalike-injected catalog, UNIFORM goals
webshop_pool_size: 16
webshop_base_port: 8108

client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=6144
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=6144
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
