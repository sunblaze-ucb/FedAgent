# SCALED task-heterogeneity run (the ABLATION partner of fed_webshop_scaled_catalog):
# SAME disjoint per-client goal slices, but FULL catalog (no env perturbation).
# catalog_split vs task_disjoint differ ONLY by the catalog filter -> isolates the
# pure ENV-heterogeneity effect under FedAvg (task partition held fixed).
# Qwen2.5-1.5B @ 15 turns, 2 clients x 4 rounds. Runs concurrently on GPUs 2,3.

env_kind: webshop
env_spec: config/envs/webshop_15.yaml
output_dir: /tmp/xbb9020_fedagent_scaled_task
model_path: Qwen/Qwen2.5-1.5B-Instruct                  # HF id; offline clusters: --model-path <local snapshot>

total_clients: 2
clients_per_round: 2
total_rounds: 4
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 2
total_training_steps: 4
save_freq: 4
wait_between_clients: 8

partition_strategy: task_disjoint     # disjoint goals, FULL catalog (task-only heterogeneity)
env_div: 0.7
keep_ratio: 0.7
min_goals_per_client: 100
webshop_pool_size: 16
webshop_base_port: 8082               # distinct ports from the catalog run (8080/8081)

client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=6144
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=6144
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
