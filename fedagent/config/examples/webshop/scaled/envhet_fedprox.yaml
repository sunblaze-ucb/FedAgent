# FedProx-vs-FedAvg under ENV heterogeneity: identical to the envhet_c4 run
# (catalog_split, 8 rounds) but with the FedProx proximal term enabled (mu>0). Pairs
# directly with envhet_c4 (FedAvg, mu=0) to test the MITIGATION story: does the proximal
# term recover the env-heterogeneity degradation (does it pull A back toward B/C)?
# FedProx is injected non-fork via the Ray worker_process_setup_hook (fedagent/fedprox.py).
# Qwen2.5-1.5B @ 15 turns, 2 clients x 8 rounds, robust single-run recipe (n_gpus 4, pool 16).

env_kind: webshop
env_spec: config/envs/webshop_15.yaml
output_dir: /tmp/xbb9020_fedagent_envhet_fedprox
model_path: Qwen/Qwen2.5-1.5B-Instruct                  # HF id; offline clusters: --model-path <local snapshot>

total_clients: 2
clients_per_round: 2
total_rounds: 8
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 4
total_training_steps: 4
save_freq: 4
wait_between_clients: 8

partition_strategy: catalog_split    # ENV heterogeneity (disjoint catalogs) -- same as envhet_c4
env_div: 0.7
keep_ratio: 0.7
min_goals_per_client: 100
fedprox_mu: 0.1                       # >0 => FedProx proximal term (vs envhet_c4's FedAvg, mu=0)
webshop_pool_size: 16
webshop_base_port: 8112              # distinct from all other configs

client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=6144
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=6144
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
