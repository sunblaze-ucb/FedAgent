# ENV-heterogeneity Variant 5 (Rank Wrapper): each client wraps the BM25 search engine with
# a different rank-perturbation behaviour (e.g. inverted top-k, partial shuffle) -> a distinct
# result-ordering transition kernel P_i, goal/task split UNIFORM (full catalog). Verbatim
# _rank_wrapper_partition_webshop (fedagent/hetero/webshop_env_variants.py); per-client seed =
# base_seed+client_id. Qwen2.5-1.5B @ 15 turns, 2x4 (n_gpus 4, pool 16).

env_kind: webshop
env_spec: config/envs/webshop_15.yaml
output_dir: /tmp/xbb9020_fedagent_scaled_rank
model_path: Qwen/Qwen2.5-1.5B-Instruct                  # HF id; offline clusters: --model-path <local snapshot>

total_clients: 2
clients_per_round: 2
total_rounds: 4
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 4
total_training_steps: 4
save_freq: 4
wait_between_clients: 8

partition_strategy: rank_wrapper       # env-variant V5: rank-wrapper search engine, UNIFORM goals
webshop_pool_size: 16
webshop_base_port: 8110

client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=6144
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=6144
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
