# LOCAL baseline (paper "Local Agent Training"): ONE client trains ALONE on its own slice
# of an N-way heterogeneous partition, no federation -- what you get WITHOUT collaboration.
# Pinned via local_client_id (== original 'uniform_single'); only that client's env service
# is launched. Paired here with the catalog_split env-het arm (client 0 of 2) so it is the
# direct "Local vs FedAvg under env-heterogeneity" comparison against
# examples/webshop/scaled/catalog.yaml. Swap partition_strategy/total_clients/local_client_id to
# match any other federated arm. Qwen2.5-1.5B @ 15 turns, 4 GPUs.

env_kind: webshop
env_spec: config/envs/webshop_15.yaml
output_dir: /tmp/xbb9020_fedagent_scaled_local_c0
model_path: Qwen/Qwen2.5-1.5B-Instruct                  # HF id; offline clusters: --model-path <local snapshot>

total_clients: 2                       # the partition is computed for 2 clients...
local_client_id: 0                     # ...but only client 0 trains, alone, every round (no FedAvg)
clients_per_round: 1
total_rounds: 4
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 4
total_training_steps: 4
save_freq: 4
wait_between_clients: 8

partition_strategy: catalog_split      # client 0's disjoint catalog shard (env-het); pairs with the catalog fed arm
env_div: 0.7
keep_ratio: 0.7
min_goals_per_client: 100
webshop_pool_size: 16
webshop_base_port: 8080                # client 0 -> :8080 (same partition math as the catalog fed arm)

client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=6144
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=6144
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
