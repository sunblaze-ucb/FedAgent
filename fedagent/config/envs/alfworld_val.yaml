# ALFWorld VALIDATION env-spec (paired with run_fed val_env_spec). The agent talks to the
# shared UNPERTURBED val service (PARTITION_STRATEGY=uniform). The paper's ALFWorld test set is
# 274 trials = valid_seen(140) + valid_unseen(134); a single val service can only draw ONE split
# (alfworld_val_split: eval_in_distribution=valid_seen / eval_out_of_distribution=valid_unseen).
# n_envs=140 covers valid_seen for the in-loop round->success curve. For the FULL 274 + the
# per-task-type breakdown, run tools/verl08_migration/eval_alfworld_by_tasktype.py which evals
# BOTH splits on the final model. 50-turn budget matches training.
envs:
  - name: ALFWorld
    n_envs: 140
    max_turns: 50   # matches training (original ALFWorld max_steps=50); see alfworld.yaml GPU-VERIFY note
    agent_name: gym_text
    config:
      timeout: 180.0
